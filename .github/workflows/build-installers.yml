name: Build Modern Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build Installer - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform_name: Windows
          - os: macos-latest
            platform_name: macOS
          - os: ubuntu-22.04
            platform_name: Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies & PyInstaller
        run: pip install qiskit>=1.0.0 qiskit-aer>=0.17.0 qiskit-ibm-runtime>=0.20.0 numpy>=2.1.0 Pillow scipy pyinstaller

      - name: Compile Backend with PyInstaller
        run: python -m PyInstaller --onefile --distpath ./effect --collect-submodules effect effect/apply_effect.py

      - name: Install Node Dependencies
        working-directory: ./modern
        run: npm run install-all

      - name: Build Electron App
        working-directory: ./modern
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION=${GITHUB_REF_NAME#v}
          npm run dist -- --${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'macos-latest' && 'mac' || 'linux' }} -c.extraMetadata.version=$VERSION

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QuantumBrush-${{ matrix.platform_name }}-Installer
          path: |
            modern/dist-electron/*.exe
            modern/dist-electron/*.dmg
            modern/dist-electron/*.AppImage
            modern/dist-electron/*.deb

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuantumBrush ${{ github.ref_name }}"
          body: |
            ## QuantumBrush (Modern Electron Version)
            
            ### Installation
            | Platform | File |
            |----------|------|
            | Windows | `.exe` Installer |
            | macOS | `.dmg` Installer |
            | Linux | `.AppImage` / `.deb` |
            
            > **Note:** This version is completely standalone. It includes a fully bundled Python environment and all required quantum libraries (Qiskit, Numpy) natively. No external Python installation is required!
          files: dist/**/*
          draft: false
          prerelease: false
